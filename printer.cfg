##	Uncomment for 250mm build
#gantry_corners:
#	-60,-10
#	310, 320
##	Probe points
#points:
#	50,25
#	50,175
#	200,175
#	200,25
	
##	Gantry Corners for 300mm Build
##	Uncomment for 300mm build
#gantry_corners:
#	-60,-10
#	360,370
##	Probe points
#points:
#	25,25
#	25,225
#	275,225
#	275,25

###	Gantry Corners for 350mm Build
###	Uncomment for 350mm build
#gantry_corners:
#	-60,-10
#	410,420
###	Probe points
#points:
#	50,25
#	50,275
#	300,275
#	300,25

##	Gantry Corners for TAP 350mm Build
##	Uncomment for TAP 350mm build
gantry_corners:
	-60,-10
	410,420
##	Probe points
points:
    50,50     # stepper_z   (A)
    50,300    # stepper_z1  (D)
    300,300   # stepper_z2  (C)
    300,50    # stepper_z3  (B)

#--------------------------------------------------------------------
speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.01   #0.0075
max_adjust: 7

