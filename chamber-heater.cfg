######################
### Chamber Heater ###
######################
[thermistor NTC 10K TT4-G10KC3-T180-C312-200]
temperature1: 25
resistance1: 10000
beta: 3977

[heater_generic chamber_heater]
heater_pin: PC8
sensor_type: NTC 10K TT4-G10KC3-T180-C312-200
sensor_pin: PC1
control: pid
pid_Kp: 7.119
pid_Ki: 0.185
pid_Kd: 68.609
max_power: 0.5
min_temp: 0
max_temp: 120

[verify_heater chamber_heater]
max_error: 120
check_gain_time: 120
hysteresis: 5
heating_gain: 2

##########################
### Chamber Heater Fan ###
##########################
[heater_fan chamber_heater_fan]
pin: PA14
max_power: 1.0
heater: chamber_heater
heater_temp: 45.0 # fan will turn off below this level

########################################
### Chamber thermistor + exhaust fan ###
########################################
[fan_generic exhaust_fan]
pin: PB3
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 5.0
cycle_time:0.01
off_below:0.1

[thermistor NTCLE100E3]
temperature1: 25
resistance1: 100000
temperature2: 40
resistance2: 51750
temperature3: 60
resistance3: 23220

[temperature_sensor chamber]
sensor_type: NTCLE100E3
sensor_pin: PC0
gcode_id: C

######################################
### Macros for heating the chamber ###
######################################
[gcode_macro M141]
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE heater="chamber_heater" target={s}

[gcode_macro M191]
gcode:
    {% set chamber = params.S|float %}
    {% set sensor = "temperature_sensor chamber" %}
    {% if chamber == 0 %}
        # If target temperature is 0, do nothing
        M117 Chamber heating cancelled
    {% else %}
        _STATUS_HEATING
        # Turn off the exhaust so that we can heat up faster
        SET_FAN_SPEED FAN=exhaust_fan SPEED=0
        # Set the heater to be very high until we reach the needed temp
        SET_HEATER_TEMPERATURE HEATER="chamber_heater" TARGET={110}
        # Use heat bed to assist chamber heating
        M140 S110
        # Turn on the nevermore filter to speed up heating the chamber from bed
        SET_FAN_SPEED FAN=Nevermore SPEED=1
        SET_FAN_SPEED FAN=bed_fans SPEED=0.3
        {% if printer[sensor].temperature < chamber-1 %}
          TEMPERATURE_WAIT SENSOR="{sensor}" MINIMUM={chamber-1} MAXIMUM={chamber+1}
        {% endif %}

        # --- Chamber target formula (non-linear) ---
        # Exact fit for: (40->60), (50->100), (60->110)
        # −0.15x2+17.5x−400
        {% if chamber <= 40 %}
          {% set chamber_target = chamber %}
        {% else %}
          {% set chamber_target = (-0.15*chamber*chamber + 17.5*chamber - 400) %}
          # Never under-request
          {% if chamber_target < chamber %}
            {% set chamber_target = chamber %}
          {% endif %}
        {% endif %}
        
        # Cap at 110 C
        {% if chamber_target > 110 %}
          {% set chamber_target = 110 %}
        {% endif %}
        
        # Round for Klipper (optional)
        {% set chamber_target = chamber_target|round(0, 'common')|int %}

        SET_HEATER_TEMPERATURE HEATER="chamber_heater" TARGET={chamber_target}
        
        SET_FAN_SPEED FAN=bed_fans SPEED=0.1
        M117 Chamber at target temperature
    {% endif %}

[gcode_macro COOL_CHAMBER]
description: "Start background cool-down until chamber <= TARGET"
variable_target: 40.0
variable_exhaust_speed: 1.0
variable_chamber_speed: 0.6
variable_poll: 10                   # seconds between checks
gcode:
  {% set tgt = params.TARGET|default(printer["gcode_macro COOL_CHAMBER"].target)|float %}
  {% set exs = params.EXHAUST|default(printer["gcode_macro COOL_CHAMBER"].exhaust_speed)|float %}
  {% set chs = params.CHAMBER|default(printer["gcode_macro COOL_CHAMBER"].chamber_speed)|float %}
  {% set poll = params.POLL|default(printer["gcode_macro COOL_CHAMBER"].poll)|int %}

  # Save chosen values to the macro's variables for the loop to read
  SET_GCODE_VARIABLE MACRO=COOL_CHAMBER VARIABLE=target VALUE={tgt}
  SET_GCODE_VARIABLE MACRO=COOL_CHAMBER VARIABLE=exhaust_speed VALUE={exs}
  SET_GCODE_VARIABLE MACRO=COOL_CHAMBER VARIABLE=chamber_speed VALUE={chs}
  SET_GCODE_VARIABLE MACRO=COOL_CHAMBER VARIABLE=poll VALUE={poll}

  # Turn off any chamber heater
  SET_HEATER_TEMPERATURE heater=chamber_heater target=0

  # Start fans now
  SET_FAN_SPEED fan=exhaust_fan speed={exs}
  SET_FAN_SPEED fan=bed_fans speed={chs}
  SET_FAN_SPEED fan=Nevermore speed={chs}

  # Kick off the loop
  UPDATE_DELAYED_GCODE id=_cool_chamber_loop DURATION=1

# 3) The loop that checks temperature and stops fans when cool
[delayed_gcode _cool_chamber_loop]
gcode:
  {% set tgt = printer["gcode_macro COOL_CHAMBER"].target|float %}
  {% set exs = printer["gcode_macro COOL_CHAMBER"].exhaust_speed|float %}
  {% set chs = printer["gcode_macro COOL_CHAMBER"].chamber_speed|float %}
  {% set poll = printer["gcode_macro COOL_CHAMBER"].poll|int %}
  {% set t = printer["temperature_sensor chamber"].temperature|float %}
  {% set state = printer.print_stats.state|string %}

  {% if state == "printing" %}
    UPDATE_DELAYED_GCODE id=_cool_chamber_loop DURATION=0
  {% elif  t > tgt %}
    # Keep fans running; schedule next check
    SET_FAN_SPEED fan=exhaust_fan speed={exs}
    SET_FAN_SPEED fan=bed_fans speed={chs}
    SET_FAN_SPEED fan=Nevermore speed={chs}
    UPDATE_DELAYED_GCODE id=_cool_chamber_loop DURATION={poll}
  {% else %}
    # Cool enough — stop fans
    SET_FAN_SPEED fan=exhaust_fan speed=0
    SET_FAN_SPEED fan=bed_fans speed=0
    SET_FAN_SPEED fan=Nevermore speed=0
  {% endif %}
