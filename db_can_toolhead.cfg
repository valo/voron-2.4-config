[include Orbiter2_SmartSensor.cfg]

[mcu db_can_th]
canbus_uuid=fdd8f51ac951

##  In E0-MOT Position
[extruder]
step_pin: db_can_th:PB9
dir_pin: !db_can_th:PB8
enable_pin: !db_can_th:PB7

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point for Bondtech 5mm gears
##  34.37086 for Bondtech 8mm gears (Galileo)
rotation_distance: 4.637   #22.6789511   #Bondtech 5mm Drive Gears
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
##  Use 7.5:1 for Galileo
# gear_ratio: 50:10               #for Stealthburner/Clockwork2 BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: db_can_th:PA7 # Heat
pullup_resistor: 2200
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
sensor_type: PT1000
sensor_pin: db_can_th:PA6 # TH
min_temp: 0
max_temp: 400
max_power: 1.0
min_extrude_temp: 180
##  Try to keep pressure_advance below 1.0
pressure_advance: 0.02 #0.05
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.03
max_extrude_cross_section: 50.0
max_extrude_only_distance: 500
max_extrude_only_velocity: 120


[tmc2209 extruder]
uart_pin: db_can_th:PC14
interpolate: true
run_current: 0.85
hold_current: 0.1
sense_resistor: 0.110
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4
##diag_pin: db_can_th:PB5

[adxl345]
cs_pin: db_can_th:PB12
spi_software_sclk_pin: db_can_th:PB10
spi_software_mosi_pin: db_can_th:PB11
spi_software_miso_pin: db_can_th:PB2
axes_map: y,-z,-x

[resonance_tester]
accel_chip: adxl345
probe_points:
    175,175,30 # an example
	
# You will need to configure a neopixel (or other addressable led, such as dotstar). See
# https://www.klipper3d.org/Config_Reference.html#neopixel for configuration details.
# And you can get sb led MACRO here: https://github.com/PrinterConfigs/DoomConfig/blob/master/stealthburner.cfg
# Or here https://github.com/sttts/voron-klipper-config/blob/master/stealthburner_leds.cfg
[neopixel sb_leds]
pin: db_can_th:PA10
chain_count: 3
color_order: GRB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0
initial_WHITE: 1.0

[fan]
pin: db_can_th:PA9

[heater_fan hotend_fan]
pin: db_can_th:PA5
shutdown_speed: 0

# [output_pin activity_led]
# pin: db_can_th:PA1

# IO.0
# db_can_th:PB6
# IO.1
# db_can_th:PB11
# IO.2
# db_can_th:PB7

#####################################################################
#       Probe
#####################################################################


[probe]
##      Inductive Probe - If you use this section , please comment the [bltouch] section
##      This probe is not used for Z height, only Quad Gantry Leveling
##      In Z+ position
##      If your probe is NO instead of NC, add change pin to ^db_can_th:PB6
pin: db_can_th:PB1 # In IN.0 position
x_offset: 0
y_offset: 0 #25.0
#z_offset: 0
speed: 10.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.01  #0.006
samples_tolerance_retries: 3

##   TAP
activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 10 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be too hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

[temperature_sensor can_mcu_temp]
sensor_type: temperature_mcu
sensor_mcu: db_can_th
min_temp: 0
max_temp: 150