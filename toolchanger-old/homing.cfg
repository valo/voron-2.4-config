[gcode_macro _HOME_X]
gcode:
    SET_KINEMATIC_POSITION X=0 SET_HOMED=X
    G91
    G1 X+15 F1200

    # Position the gantry at the X probe
    G90
    G1 Y185 F15000
    
    #G4 P2000
    #M400 to finish all pending moves/process the buffer
    M400 
    G28 X

[gcode_macro _HOME_Y]
gcode:
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.49 %}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    
    SET_KINEMATIC_POSITION Y=15 SET_HOMED=Y
    G91
    G1 Y-15 F1200
    
    #G4 P2000
    #M400 to finish all pending moves/process the buffer
    M400 
    
    # Home
    G28 Y
    # Move away
    G91
    G1 Y-15 F1200

    # Wait just a second… (give StallGuard registers time to clear)
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[homing_override]
axes: xyz
gcode:
  INITIALIZE_TOOLCHANGER
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if home_all %}
    G90 ; absolute mode
    G28 Z
    G0 Z10 F1000
  {% endif %}

  # Home Y first if XY need to be homed, as X is a physical endstop at a specific location
  {% if home_all or 'Y' in params or 'X' in params %}
    _HOME_Y
  {% endif %}

  {% if home_all or 'X' in params %}
    _HOME_X
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    {% set random_x = (range(-50, 50) | random) / 10 %}
    {% set random_y = (range(-50, 50) | random) / 10 %}
    G90 ; absolute mode
    G0 X{175.0+random_x} Y{175.0+random_y} F12000
    G28 Z
    ADJUST_Z_AFTER_TOOL_NOZZLE_HOME
    G0 Z10 F1000
  {% endif %}

  #_ADJUST_Z_HOME_FOR_TOOL_OFFSET


[gcode_macro _CG28]
description: Homing only if necessary
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

# ; Depending on the selected tool at the time of homing, the physical Z endstop position is offset.
# ; This corrects for that using current tool offset.
