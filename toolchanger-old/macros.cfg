[gcode_macro M104]
rename_existing: M104.1
description: [T<index>] [S<temperature>]
  Set tool temperature.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE{newparameters}
  {% else %}
    M104.1 {rawparams}
  {% endif %}

[gcode_macro M109]
rename_existing: M109.1
description: [T<index>] [S<temperature>]
  Set tool temperature and wait.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE WAIT=1 {newparameters}
  {% else %}
    M109.1 {rawparams}
  {% endif %}


# [gcode_macro PRINT_START]
# gcode:
# 	{% set BED_TEMP=params.BED_TEMP|default(60)|float %}
# 	{% set EXTRUDER_TEMP=params.EXTRUDER_TEMP|default(190)|float %}

#     M117 Starting Print...
#     STATUS_BUSY

#     SET_FAN_SPEED FAN=Nevermore SPEED=1

#     # Preheat the bed
#     STATUS_HEATING
# 	M140 S{BED_TEMP}
# 	M104 S140

#     STATUS_HOMING
# 	# Home the printer
# 	G90
# 	M83
# 	G28
	
# 	# Z probing sequence
#     STATUS_LEVELING
# 	QUAD_GANTRY_LEVEL

#     STATUS_MESHING
# 	BED_MESH_CALIBRATE ADAPTIVE=1
#     SKEW_PROFILE LOAD=CaliFlower
    
#     M190 S{BED_TEMP}
	
# 	# Heat the extruder to the desired temperature
#     STATUS_HEATING
# 	M104 S{EXTRUDER_TEMP}
# 	TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}

#     SET_FAN_SPEED FAN=exhaust_fan SPEED=1

#     STATUS_BUSY
#     BRUSH_NOZZLE

#     # Prime the filament
#     G90
#     G92 E0
#     G1 X5 Y5 Z0.30 F3000
#     G1 X250 E15 F1500
#     G1 Z2.0 F3000
#     G92 E0

#     M117 Printing...
#     STATUS_PRINTING


[gcode_macro PRINT_START]
description: "Initialize toolchanger, home, QGL, and prepare for printing"
gcode:
    STATUS_BUSY

    SET_FAN_SPEED FAN=Nevermore SPEED=1
    
    # Initialize toolchanger
    INITIALIZE_TOOLCHANGER

    # Stop tool probe crash detection during startup
    ; STOP_TOOL_PROBE_CRASH_DETECTION

    # Determine which tools will be used in this print
    {% set initial_tool = params.TOOL|default(0)|int %}
    {% set tool_count = 1 %}
    {% for tool_nr in printer.toolchanger.tool_numbers %}
        {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
        {% if tooltemp_param in params %}
            {% if tool_nr != initial_tool %}
                {% set tool_count = tool_count + 1 %}
            {% endif %}
        {% endif %}
    {% endfor %}

    # Set bed temperature
    STATUS_HEATING
    M140 S{params.BED_TEMP|default(60)|float}

    # Home all axes
    STATUS_HOMING
    G28

    # Determine if we should use T0 or the single tool for QGL
    {% if tool_count == 1 %}
        # Only one tool is being used - use it for QGL instead of switching to T0
        T{initial_tool}
    {% else %}
        # Multiple tools - always use T0 for QGL
        T0
    {% endif %}

    STATUS_HEATING
    # Heat nozzle to 140C for QGL (softens any leftover filament)
    M109 S140

    STATUS_LEVELING
    # Run Quad Gantry Level
    QUAD_GANTRY_LEVEL

    # Re-home Z after QGL
    G28 Z

    # Stop heating (actual tool will be selected and heated next)
    M109 S0

    SET_FAN_SPEED FAN=exhaust_fan SPEED=1

    STATUS_BUSY
    # Optional but recommended: Clean nozzle (uncomment if you have a BRUSH_NOZZLE macro)
    BRUSH_NOZZLE

    STATUS_MESHING
    # Optional but recommended: Calibrate bed mesh (uncomment if needed)
    BED_MESH_CALIBRATE ADAPTIVE=1

    STATUS_HEATING
    # Pre-heat tools that will be used in the print
    {% for tool_nr in printer.toolchanger.tool_numbers %}
        {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
        {% if tooltemp_param in params %}
            M104 T{tool_nr} S{params[tooltemp_param]|float}
        {% endif %}
    {% endfor %}

    # Select the initial tool for printing
    {% if params.TOOL is defined %}
        T{params.TOOL|int}
    {% else %}
        T0  # Default to T0 if not specified
    {% endif %}

    STATUS_HEATING
    # Heat the initial tool to printing temperature
    M109 S{params.TOOL_TEMP|default(220)|float}

    # Restart tool probe crash detection
    ; START_TOOL_PROBE_CRASH_DETECTION

    # Optional but recommended: Prime the nozzle (uncomment if needed)
    # Adjust coordinates and extrusion amount to match your printer setup
    # NOTE: Do not prime tool 0 as that might not be the first tool to be used. Use a skirt instead
    # G90
    # G92 E0
    # G1 X5 Y5 Z0.30 F3000
    # G1 X250 E15 F1500
    # G1 Z2.0 F3000
    # G92 E0

    STATUS_PRINTING
