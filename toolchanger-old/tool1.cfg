# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu th1]
canbus_uuid: 068ecee60f7d

[adxl345]
cs_pin: th1:PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    175,175,30 # an example


[extruder1]
step_pin: th1:PD0
dir_pin: th1:PD1
enable_pin: !th1:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.61849
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_only_velocity: 120

heater_pin: th1:PB13
sensor_type:MAX31865
sensor_pin: th1:PA4
spi_bus: spi1
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
min_temp: 0
max_temp: 330

control: pid
pid_Kp: 32.296
pid_Ki: 11.332
pid_Kd: 23.012
smooth_time: 0.5


[tmc2209 extruder1]
uart_pin: th1:PA15
interpolate: true
run_current: 0.85 #**
hold_current: 0.100
sense_resistor: 0.11 #**
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[fan_generic T1_partfan]
pin: th1:PA0

[heater_fan T1_hotend_fan]
pin: th1:PA1
heater: extruder1
heater_temp: 50.0

[neopixel T1_rgb]
pin: th1:PD3
chain_count: 3
color_order: GRB
initial_RED: 0
initial_GREEN: 0
initial_BLUE: 0
initial_WHITE: 0

[tool_probe T1]
pin: ^th1:PB6
z_offset: 0
# z_offset: -1.157
# z_offset: 0
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder1

[gcode_macro T1]
variable_color: ""
gcode:
  SELECT_TOOL T=1

[tool T1]
fan: T1_partfan
tool_number: 1
extruder: extruder1
detection_pin: ^th1:PB6
tool_probe: tool_probe T1
gcode_x_offset: -0.2
gcode_y_offset: 0.1
gcode_z_offset: 4.825
params_park_x: 338.5
params_park_y: 3.5
params_park_z: 297.8
params_input_shaper_freq_x: 64.2
# params_input_shaper_type_x: MZV
# params_input_shaper_damping_ratio_x: 0.051
params_input_shaper_freq_y: 57.6
# params_input_shaper_type_y: EI
# params_input_shaper_damping_ratio_y: 0.050
